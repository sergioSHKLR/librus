<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Block 1 of 2 — library document head
    Description: Meta, CSS modules, brand for L.I.B.R.U.S library home
    Version: 1.a
    Revised: 260710 16:30
  -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>L.I.B.R.U.S — Library</title>
  <meta name="description" content="L.I.B.R.U.S — annotate / read / consult" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/00-tokens.css" />
  <link rel="stylesheet" href="css/01-reset.css" />
  <link rel="stylesheet" href="css/02-layout.css" />
  <link rel="stylesheet" href="css/03-toolbar.css" />
  <link rel="stylesheet" href="css/07-library.css" />
  <link rel="stylesheet" href="css/08-theme-dark.css" />
</head>
<body class="page-library app-shell">
  <!--
    Block 2 of 2 — library body
    Description: Header, cover grid mount, theme/lang controls
    Version: 1.a
    Revised: 260710 16:30
  -->
  <header class="library-header">
    <div class="library-header-inner">
      <div class="library-brand">
        <div class="library-brand-mark" aria-hidden="true">L</div>
        <div>
          <h1 class="library-title" data-i18n="brand">L.I.B.R.U.S</h1>
          <p class="library-panes" id="library-tagline" data-i18n="tagline">annotate / read / consult</p>
        </div>
      </div>
      <div class="library-header-actions">
        <button type="button" class="toolbar-btn" id="btn-lang-toggle" title="Language" aria-label="Language" data-i18n-aria="settings.language">
          <span id="lang-toggle-label" style="font-size:0.75rem;font-weight:700;">EN</span>
        </button>
        <button type="button" class="toolbar-btn" id="btn-theme-toggle" title="Theme" aria-label="Theme">
          <img src="icons/device.svg" class="toolbar-icon" id="theme-toggle-icon" alt="" width="20" height="20" />
        </button>
      </div>
    </div>
  </header>

  <main class="library-main app-main">
    <section class="library-intro" aria-labelledby="library-heading">
      <h2 id="library-heading" class="library-heading" data-i18n="library.title">Library</h2>
      <p class="library-lead" data-i18n="library.lead">Open, read, annotate. Research on a wide screen.</p>
    </section>

    <div id="library-empty" class="library-empty" hidden></div>
    <ul class="cover-grid" id="cover-grid" role="list"></ul>
  </main>

  <footer class="library-footer">
    <span data-i18n="library.footerNote">Notes via Hypothes.is · research links on desktop only</span>
  </footer>

  <script type="module" src="js/library/main.js"></script>
</body>
</html>
